- name: Configure and restart Nginx
  hosts: localhost
  become: true
  tasks:
    - name: Copy Nginx configuration file
      copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf
      notify: Restart Nginx  # This MUST match the name of the handler exactly

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
